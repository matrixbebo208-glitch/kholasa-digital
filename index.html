<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الخلاصة ديجيتال | El Kholasa 🌊</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* إضافة ستايل بسيط للتنبيهات والرسائل البرمجية */
        .urgent-status-msg {
            background: rgba(255, 0, 0, 0.1);
            color: #ff4d4d;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-top: -10px;
            margin-bottom: 15px;
            display: none; /* مخفي افتراضياً */
            border: 1px solid rgba(255, 0, 0, 0.2);
            text-align: center;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="ocean"></div>

    <div class="container">
        <header style="text-align: center; margin-bottom: 20px;">
            <h1 style="margin-bottom: 0;">الخلاصة ديجيتال 🐟</h1>
            <div class="version" id="vNumber">إصدار 3.0.1 - MATRIX AI</div>
        </header>

        <div class="glass-card">
            <form id="orderForm">
                <label>بيانات العميل:</label>
                <input type="text" id="uName" placeholder="اسمك الكامل" required>
                <input type="tel" id="uPhone" placeholder="رقم واتساب التواصل" required>

                <label>تفاصيل المشروع:</label>
                <input type="text" id="bName" placeholder="اسم البراند / المشروع" required>
                <textarea id="bDesc" rows="3" placeholder="وصف التصميم (الألوان والمجال)..." required></textarea>

                <label>خطة التنفيذ (التوقيت):</label>
                <select id="speed" onchange="calcPrice()">
                    <option value="50">عادي (24 ساعة) - 50 ج</option>
                    <option value="85" id="urgentOpt">مستعجل (ساعتين) - 85 ج</option>
                </select>
                <div id="statusMsg" class="urgent-status-msg">⚠️ نعتذر، خدمة المستعجل مشغولة حالياً (اضغط "عادي").</div>

                <label>سكرين شوت التحويل (01224815487):</label>
                <input type="file" id="uFile" accept="image/*" required>

                <div id="totalPrice" class="total-price" style="text-align:center; font-weight:bold; font-size:1.3rem; margin:15px; color:#FFB000;">
                    المطلوب: 50 جنيه
                </div>
                
                <button type="submit" class="btn-main" id="subBtn">تأكيد الطلب والصيد 🚀</button>
            </form>
        </div>
    </div>

    <div id="admin-panel" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; padding: 30px; box-sizing: border-box; overflow-y: auto;">
        <h2 style="color:#FFB000; text-align: center;">لوحة تحكم القبطان MATRIX ⚓</h2>
        
        <div class="stats-box" style="background: #111; border: 1px solid #FFB000; padding: 20px; border-radius: 20px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: center;">
            <div>
                <p style="margin: 0; color: #ccc;">إجمالي الأرباح</p>
                <h2 id="rev" style="color:#FFB000; margin:5px 0;">0</h2>
            </div>
            <div>
                <p style="margin: 0; color: #ccc;">عدد الطلبات</p>
                <h2 id="cnt" style="margin:5px 0;">0</h2>
            </div>
        </div>

        <h3 style="border-bottom: 1px solid #333; padding-bottom: 10px;">سجل العمليات:</h3>
        <div id="log" style="color: #eee; font-size: 0.9rem;"></div>
        
        <br><br>
        <button id="closeAdmin" style="background:red; color:white; padding:15px; border:none; width:100%; border-radius:15px; cursor:pointer; font-weight: bold;">خروج وتشفير البيانات</button>
    </div>

    <script src="script.js"></script>
    <script src="assets.js"></script>
</body>
</html>
